# Basic workflow

name: Build

on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable

      - name: install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 2
          retry_wait_seconds: 10
          command: yarn install --immutable

      - name: build
        run: yarn build

      - name: generate coverage
        run: |
          yarn coverage
          echo done

      - name: upload to codecov.io
        uses: codecov/codecov-action@v5
        with:
          directory: ./coverage/
          plugins: noop
          files: ./coverage/coverage-final.json

      - name: delete coverage and blend files
        run: rm -rf coverage dist/models/*.blend dist/models/d-snooker.gltf dist/models/p8.gltf dist/models/snooker.gltf dist/models/d-snooker.bin dist/models/p8.bin dist/models/snooker.bin

      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifact
          path: dist/
